<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}LeadPulse{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            brand: {
              50:  '#fafafa',
              100: '#f4f4f5',
              200: '#e4e4e7',
              300: '#d4d4d8',
              400: '#a1a1aa',
              500: '#71717a',
              600: '#52525b',
              700: '#3f3f46',
              800: '#27272a',
              900: '#18181b',
              950: '#09090b',
            },
            accent: {
              400: '#2dd4bf',
              500: '#14b8a6',
              600: '#0d9488',
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .fade-in { animation: fadeIn .4s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .score-bar { transition: width .6s ease; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
    .pulse-dot { animation: pulse-dot 1.5s infinite; }
    @keyframes counter { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-counter { animation: counter .5s ease-out forwards; }
    .glass { background: rgba(255,255,255,.65); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .dark .glass { background: rgba(255,255,255,.03); }
    .card { border-radius: 1rem; border: 1px solid rgba(228,228,231,0.5); background: rgba(255,255,255,0.80); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); transition: border-color 0.2s; }
    .dark .card { border-color: rgba(255,255,255,0.06); background: rgba(255,255,255,0.03); }
    .card:hover { border-color: rgba(161,161,170,0.4); }
    .dark .card:hover { border-color: rgba(255,255,255,0.12); }
  </style>
  <script>
    if (localStorage.getItem('theme') !== 'light') {
      document.documentElement.classList.add('dark');
    }
  </script>
</head>
<body class="relative flex min-h-full flex-col bg-brand-50 text-brand-900 antialiased dark:bg-[#0a0a0a] dark:text-brand-100 transition-colors duration-300">
  <div class="pointer-events-none fixed inset-0 bg-[radial-gradient(ellipse_80%_50%_at_50%_-20%,rgba(20,184,166,0.05),transparent)] dark:bg-[radial-gradient(ellipse_80%_50%_at_50%_-20%,rgba(20,184,166,0.08),transparent)]"></div>

  <!-- ─── Navbar ────────────────────────────────────────────────────── -->
  <nav class="fixed top-5 left-1/2 z-50 w-[calc(100%-2rem)] max-w-3xl -translate-x-1/2">
    <div class="flex h-11 items-center justify-between rounded-full border border-brand-200/50 bg-white/70 backdrop-blur-xl px-1.5 dark:border-white/[0.08] dark:bg-white/[0.03]">
      <a href="/" class="flex items-center gap-2 pl-3 text-sm font-semibold tracking-tight text-brand-900 dark:text-white">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/>
        </svg>
        LeadPulse
      </a>
      <!-- Crawler status dot -->
      <div id="nav-crawler" class="flex items-center gap-1.5 pl-2 cursor-default" title="Crawler offline">
        <span id="nav-crawler-dot" class="inline-block h-2 w-2 rounded-full bg-amber-400"></span>
        <span id="nav-crawler-label" class="text-[11px] font-medium text-amber-500 dark:text-amber-400 hidden sm:inline">Offline</span>
      </div>
      <div class="flex items-center gap-0.5">
        <a href="/" class="rounded-full px-3 py-1 text-sm text-brand-500 transition-colors hover:text-brand-900 dark:text-zinc-400 dark:hover:text-white">Dashboard</a>
        <a href="/search" class="rounded-full px-3 py-1 text-sm text-brand-500 transition-colors hover:text-brand-900 dark:text-zinc-400 dark:hover:text-white">Search</a>
        <a href="/leads" class="rounded-full px-3 py-1 text-sm text-brand-500 transition-colors hover:text-brand-900 dark:text-zinc-400 dark:hover:text-white">Leads</a>
        <a href="/analytics" class="rounded-full px-3 py-1 text-sm text-brand-500 transition-colors hover:text-brand-900 dark:text-zinc-400 dark:hover:text-white">Analytics</a>
        <a href="/export" class="rounded-full bg-brand-900 px-3.5 py-1 text-sm font-medium text-white transition hover:bg-brand-800 dark:bg-white dark:text-black dark:hover:bg-zinc-200">Export</a>
        <button id="theme-toggle" class="ml-1 rounded-full p-1.5 text-brand-400 transition-colors hover:text-brand-700 dark:text-zinc-500 dark:hover:text-white" title="Toggle theme">
          <svg id="icon-sun" class="hidden h-4 w-4 dark:block" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg>
          <svg id="icon-moon" class="block h-4 w-4 dark:hidden" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- ─── Content ───────────────────────────────────────────────────── -->
  <main class="relative z-10 mx-auto w-full max-w-5xl flex-1 px-4 pt-24 pb-10 sm:px-6 fade-in">
    {% block content %}{% endblock %}
  </main>

  <!-- ─── Footer ────────────────────────────────────────────────────── -->
  <footer class="relative z-10 border-t border-brand-100 dark:border-white/[0.06]">
    <div class="mx-auto max-w-5xl px-4 py-5 sm:px-6">
      <p class="text-center text-xs text-brand-400 dark:text-zinc-600">&copy; 2026 LeadPulse</p>
    </div>
  </footer>

  <!-- Dark mode script -->
  <script>
    document.getElementById('theme-toggle').addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    });
  </script>

  <!-- Global crawler status polling -->
  <script>
  (function(){
    const dot=document.getElementById('nav-crawler-dot');
    const label=document.getElementById('nav-crawler-label');
    const wrap=document.getElementById('nav-crawler');
    let prev=null;
    async function poll(){
      try{
        const r=await fetch('/api/worker/status');
        const d=await r.json();
        if(d.online===prev) return;
        prev=d.online;
        if(d.online){
          dot.className='inline-block h-2 w-2 rounded-full bg-emerald-500 pulse-dot';
          label.textContent='Online';
          label.className='text-[11px] font-medium text-emerald-600 dark:text-emerald-400 hidden sm:inline';
          wrap.title='Crawler online';
        } else {
          dot.className='inline-block h-2 w-2 rounded-full bg-amber-400';
          label.textContent='Offline';
          label.className='text-[11px] font-medium text-amber-500 dark:text-amber-400 hidden sm:inline';
          wrap.title='Crawler offline';
        }
      }catch{}
    }
    poll();
    setInterval(poll,15000);
  })();
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
